{% extends "base.html" %}
{% block title %}Register — Coffee Expense Manager{% endblock %}

{% block guest_content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header text-white text-center py-3" style="background:#1a2e1a;">
        <h4 class="mb-0">☕ Create Account</h4>
        <small>Start managing your coffee farm</small>
      </div>
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('auth.register') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <input type="text" name="full_name" class="form-control"
                   placeholder="Tejas Kumar" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <input type="email" name="email" class="form-control"
                   placeholder="you@example.com" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Min. 6 characters" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control"
                   placeholder="••••••••" required/>
          </div>
          <button type="submit" class="btn w-100 text-white fw-bold"
                  style="background:#2d5a2d;">
            <i class="bi bi-person-plus"></i> Create Account
          </button>
        </form>
      </div>
      <div class="card-footer text-center py-3">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="fw-semibold"
           style="color:#2d5a2d;">Login here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
