{% extends "base.html" %}
{% block title %}Add Farm — Coffee Expense Manager{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="d-flex align-items-center gap-2 mb-4">
      <a href="{{ url_for('farms.index') }}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h4 class="fw-bold mb-0">Add New Farm</h4>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST" action="{{ url_for('farms.add') }}">

          <div class="mb-3">
            <label class="form-label fw-semibold">Farm Name <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control"
                   placeholder="e.g. Coorg Estate Block A" required/>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Location</label>
            <input type="text" name="location" class="form-control"
                   placeholder="e.g. Coorg, Karnataka"/>
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold">Area (in acres) <span class="text-danger">*</span></label>
            <input type="number" name="area_acres" class="form-control"
                   placeholder="e.g. 5.5" step="0.01" min="0.01" required/>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn text-white fw-bold flex-fill"
                    style="background:#2d5a2d;">
              <i class="bi bi-plus-circle"></i> Add Farm
            </button>
            <a href="{{ url_for('farms.index') }}"
               class="btn btn-outline-secondary flex-fill">Cancel</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}
