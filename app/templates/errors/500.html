{% extends "base.html" %}
{% block title %}Server Error{% endblock %}

{% block guest_content %}
<div class="text-center mt-5 py-5">
  <div style="font-size:80px;">⚠️</div>
  <h1 class="fw-bold" style="font-size:72px;color:#c0392b;">500</h1>
  <h4 class="fw-semibold text-muted">Something went wrong</h4>
  <p class="text-muted">An internal server error occurred. Please try again.</p>
  <a href="{{ url_for('dashboard.index') }}"
     class="btn text-white px-4 mt-2" style="background:#1a2e1a;">
    <i class="bi bi-house"></i> Back to Dashboard
  </a>
</div>
{% endblock %}
